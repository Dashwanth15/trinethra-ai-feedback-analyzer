# Pyrefly configuration — point to the project venv so Pyrefly resolves
# third-party packages (pydantic-settings, httpx, jinja2, etc.) correctly.
# See: https://pyrefly.org/en/stable/configuration/

[pyrefly]
python_interpreter = "venv/Scripts/python.exe"

# Project source root (where relative imports like `schemas.ai_output` resolve from)
search_path = ["."]
